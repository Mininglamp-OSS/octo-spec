name: octospec-lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  okf-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Run OKF conformance lint
        run: ./scripts/octospec-lint.sh .
      - name: Run sync-block regression tests
        run: python3 scripts/test_octospec_sync_block.py
      - name: Run sync shell-wrapper regression test
        run: bash scripts/test_octospec_sync_sh.sh
